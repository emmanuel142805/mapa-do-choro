<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mapa do Choro</title>
<meta name="description" content="Ordem prática para observar o choro do bebê, um passo de cada vez.">
<meta name="theme-color" content="#38473E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mapa do Choro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5EFE5;
    --paper-warm:#EFE5D4;
    --card:#FEFBF5;
    --ink:#2A2320;
    --ink-soft:#7A6B62;
    --primary:#4C5F4E;
    --primary-dark:#354338;
    --accent:#E0A567;
    --accent-soft:#F1D8B4;
    --alert:#A44E3E;
    --alert-soft:#EDD5CC;
    --line:#E5DACC;
    --line-soft:#EFE7DA;
    --radius-lg:24px;
    --radius-md:14px;
    --shadow:0 24px 60px -20px rgba(58,47,40,.18), 0 6px 18px -8px rgba(58,47,40,.08);
    --font-display:'Instrument Serif', 'Georgia', serif;
    --font-body:'DM Sans', -apple-system, sans-serif;
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(1000px 500px at 50% -10%, rgba(224,165,103,.10), transparent 60%),
      radial-gradient(700px 500px at 50% 120%, rgba(76,95,78,.06), transparent 60%);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
    min-height:100dvh;
  }
  #app{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 18px calc(76px + env(safe-area-inset-bottom));
  }
  .card{
    width:100%;
    max-width:440px;
    background:var(--card);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:32px 24px 28px;
    position:relative;
  }
  .card--entering{ animation:cardIn .34s var(--ease) both; }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(10px) scale(.995);}
    to{opacity:1;transform:none;}
  }

  h1,h2{
    font-family:var(--font-display);
    font-weight:400;
    color:var(--ink);
    margin:0 0 14px;
    letter-spacing:-.005em;
  }
  h1{font-size:1.72rem;line-height:1.18;}
  h2{font-size:1.42rem;line-height:1.22;}
  p{margin:0 0 14px;color:var(--ink);font-size:.98rem;}
  .lede{color:var(--ink-soft);font-size:.98rem;line-height:1.55;}
  .eyebrow{
    font-family:var(--font-body);
    font-size:.72rem;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--primary);
    margin:0 0 12px;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow::before{
    content:"";display:inline-block;width:22px;height:1px;background:var(--primary);opacity:.5;
  }
  .eyebrow.alert-eb{color:var(--alert);}
  .eyebrow.alert-eb::before{background:var(--alert);}

  /* breathing dot signature */
  .dot-wrap{
    display:flex;justify-content:center;align-items:center;
    height:96px;margin:2px 0 22px;position:relative;
  }
  .dot{
    width:84px;height:84px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,
      var(--accent) 0%,
      var(--accent) 18%,
      var(--accent-soft) 48%,
      rgba(241,216,180,0) 76%);
    animation:breathe 5.2s ease-in-out infinite;
    filter:blur(.3px);
  }
  .dot-aura{
    position:absolute;inset:50% auto auto 50%;
    width:140px;height:140px;transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,rgba(224,165,103,.28) 0%,rgba(224,165,103,0) 65%);
    animation:breathe 5.2s ease-in-out infinite;
    animation-delay:-0.2s;
    pointer-events:none;
  }
  @keyframes breathe{
    0%,100%{transform:scale(.88);opacity:.78;}
    50%{transform:scale(1.02);opacity:1;}
  }
  .dot-wrap.small{height:64px;margin:0 0 14px;}
  .dot-wrap.small .dot{width:52px;height:52px;}
  .dot-wrap.small .dot-aura{width:92px;height:92px;}
  @media (prefers-reduced-motion: reduce){
    .dot,.dot-aura{animation:none;}
    .card--entering{animation:none;}
  }

  /* buttons */
  .btn{
    display:block;width:100%;
    font-family:var(--font-body);
    font-size:1rem;font-weight:600;
    border-radius:var(--radius-md);
    border:none;cursor:pointer;
    min-height:56px;
    padding:14px 18px;
    text-align:center;
    transition:transform .12s var(--ease), box-shadow .18s var(--ease), background .15s;
    letter-spacing:.01em;
  }
  .btn:active{transform:translateY(1px) scale(.995);}
  .btn-primary{
    background:var(--primary);color:#fff;margin-top:6px;
    box-shadow:0 6px 18px -6px rgba(76,95,78,.45);
  }
  .btn-primary:hover{background:var(--primary-dark);box-shadow:0 8px 22px -6px rgba(76,95,78,.5);}
  .btn-alert{
    background:var(--alert);color:#fff;margin-top:6px;
    box-shadow:0 6px 18px -6px rgba(164,78,62,.45);
  }
  .btn-alert:hover{background:#8f4235;}
  .btn-text{
    background:transparent;color:var(--ink-soft);
    font-weight:500;min-height:auto;padding:6px 4px;
    text-align:left;width:auto;font-size:.9rem;
    display:inline-flex;align-items:center;gap:6px;
    transition:color .15s;
  }
  .btn-text:hover{color:var(--primary);}
  .btn-text.center{text-align:center;width:100%;justify-content:center;padding:12px 4px;}
  .btn:focus-visible{outline:3px solid var(--accent);outline-offset:3px;}
  .btn-option:focus-visible{outline:3px solid var(--accent);outline-offset:3px;}

  .option-list{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
  .btn-option{
    display:flex;width:100%;text-align:left;align-items:center;gap:12px;
    background:#fff;border:1.5px solid var(--line);
    border-radius:var(--radius-md);
    padding:15px 16px;font-family:var(--font-body);
    font-size:.98rem;line-height:1.4;color:var(--ink);cursor:pointer;
    min-height:56px;
    transition:border-color .18s var(--ease), background .18s var(--ease), transform .1s var(--ease);
  }
  .btn-option:hover{border-color:var(--primary);background:#FFFDF7;}
  .btn-option:active{transform:scale(.99);}
  .btn-option .marker{
    flex:none;width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .18s, background .18s;
  }
  .btn-option .marker::after{
    content:"";width:10px;height:10px;border-radius:50%;
    background:var(--primary);transform:scale(0);
    transition:transform .18s var(--ease);
  }
  .btn-option.selected{
    border-color:var(--primary);
    background:linear-gradient(0deg,rgba(76,95,78,.06),rgba(76,95,78,.06)),#fff;
    color:var(--primary-dark);
  }
  .btn-option.selected .marker{border-color:var(--primary);}
  .btn-option.selected .marker::after{transform:scale(1);}

  /* progress */
  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .progress-track{flex:1;height:5px;background:var(--line-soft);border-radius:6px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .38s var(--ease);}
  .progress-label{font-family:var(--font-body);font-size:.72rem;font-weight:600;color:var(--ink-soft);white-space:nowrap;letter-spacing:.06em;}

  .dica{
    background:var(--paper);
    border:1px solid var(--line-soft);
    border-radius:var(--radius-md);
    padding:12px 14px;
    font-size:.86rem;
    color:var(--ink-soft);
    line-height:1.5;
    margin:2px 0 18px;
    display:flex;gap:10px;align-items:flex-start;
  }
  .dica-icon{
    flex:none;width:18px;height:18px;border-radius:50%;
    background:var(--accent-soft);color:var(--primary-dark);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:.78rem;line-height:1;margin-top:1px;
  }
  .dica b{color:var(--primary-dark);font-weight:600;}

  .back-row{margin-bottom:6px;height:24px;}

  /* result */
  .result-list{list-style:none;margin:0 0 18px;padding:0;display:flex;flex-direction:column;gap:10px;}
  .result-list li{
    display:flex;gap:14px;align-items:flex-start;
    background:var(--paper);border:1px solid var(--line-soft);
    border-radius:var(--radius-md);padding:14px 16px;font-size:.95rem;
    line-height:1.45;
  }
  .result-num{
    font-family:var(--font-display);font-size:.9rem;color:#fff;
    background:var(--primary);border-radius:50%;
    width:24px;height:24px;flex:none;
    display:flex;align-items:center;justify-content:center;
    margin-top:0;line-height:1;
  }

  .alert-banner{
    background:var(--alert-soft);border:1px solid rgba(164,78,62,.35);
    border-radius:var(--radius-md);padding:14px 16px;margin-bottom:18px;
  }
  .alert-banner strong{
    color:var(--alert);display:block;margin-bottom:4px;
    font-family:var(--font-display);font-size:1.08rem;font-weight:400;
  }
  .alert-banner p{font-size:.9rem;margin:0;color:var(--ink);}

  .signal-list{margin:0 0 18px;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px;}
  .signal-list li{
    padding:12px 14px;background:var(--paper);border:1px solid var(--line-soft);
    border-radius:12px;font-size:.92rem;line-height:1.45;
    display:flex;gap:10px;align-items:flex-start;
  }
  .signal-list li::before{
    content:"";flex:none;width:6px;height:6px;border-radius:50%;
    background:var(--alert);margin-top:8px;opacity:.7;
  }

  .material-list{list-style:none;margin:0 0 20px;padding:0;display:flex;flex-direction:column;gap:8px;}
  .material-list a{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:14px 16px;background:#fff;border:1px solid var(--line);
    border-radius:var(--radius-md);
    text-decoration:none;color:var(--ink);font-size:.96rem;font-weight:500;
    transition:border-color .18s, transform .1s var(--ease);
  }
  .material-list a:hover{border-color:var(--primary);}
  .material-list a:active{transform:scale(.99);}
  .material-list a .arrow{color:var(--primary);font-family:var(--font-display);font-size:1.1rem;}

  .disclaimer-fixed{
    position:fixed;left:0;right:0;bottom:0;
    background:rgba(245,239,229,.92);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    text-align:center;
    font-size:.72rem;color:var(--ink-soft);
    font-family:var(--font-body);letter-spacing:.02em;
    z-index:5;
  }

  .install-banner{
    display:flex;align-items:center;gap:12px;justify-content:space-between;
    background:var(--paper);border:1px dashed rgba(76,95,78,.35);
    border-radius:var(--radius-md);padding:12px 14px;margin-top:18px;
    font-size:.86rem;color:var(--primary-dark);line-height:1.4;
  }
  .install-banner button{
    font-family:var(--font-body);font-weight:600;font-size:.82rem;
    background:var(--primary);color:#fff;border:none;border-radius:10px;
    padding:9px 14px;cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  .install-banner button:hover{background:var(--primary-dark);}
  .ios-steps{
    margin-top:10px;font-size:.85rem;background:#fff;
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ink-soft);
    line-height:1.5;
  }

  [data-autofocus]{outline:none;}

  /* subtle serif-accent underline for headings on hero/result */
  .accent-line{
    display:block;width:32px;height:2px;background:var(--accent);
    border-radius:2px;margin:14px 0 18px;
  }
</style>
</head>
<body>
<div id="app" role="main" aria-live="polite"></div>
<div class="disclaimer-fixed">Conteúdo educativo. Não substitui avaliação médica.</div>

<script>
(function(){

  /* ---------------- data ---------------- */
  var perguntas = [
    {
      id:1,
      texto:"Quando foi a última mamada ou mamadeira?",
      dica:"Sinais de fome costumam aparecer antes do choro: mãos indo à boca, cabeça virando à procura do peito, pequenos sons de sucção.",
      opcoes:[
        {label:"Há menos de 1 hora", tags:[]},
        {label:"Entre 1 e 2 horas", tags:[]},
        {label:"Entre 2 e 3 horas", tags:[]},
        {label:"Mais de 3 horas ou não lembro", tags:["ALIMENTACAO"]}
      ]
    },
    {
      id:2,
      texto:"Como está a fralda dele agora?",
      opcoes:[
        {label:"Troquei há pouco e está seca", tags:[]},
        {label:"Está molhada", tags:["FRALDA"]},
        {label:"Está suja", tags:["FRALDA"]},
        {label:"Ainda não verifiquei", tags:["FRALDA"]}
      ]
    },
    {
      id:3,
      texto:"Como está o sono dele?",
      dica:"Sinais de sono costumam vir antes do choro: esfregar os olhos ou o rosto, bocejar, puxar a orelha, olhar parado.",
      opcoes:[
        {label:"Dormiu bem há pouco tempo", tags:[]},
        {label:"Está com sinais de sono: bocejando, esfregando o rosto ou os olhos", tags:["DESCANSO"]},
        {label:"Faz tempo que ele não consegue dormir direito", tags:["DESCANSO"]},
        {label:"Não sei dizer", tags:[]}
      ]
    },
    {
      id:4,
      texto:"Há quanto tempo ele está acordado?",
      opcoes:[
        {label:"Menos de 1 hora", tags:[]},
        {label:"Entre 1 e 2 horas", tags:[]},
        {label:"Mais de 2 horas", tags:["DESCANSO"]}
      ]
    },
    {
      id:5,
      texto:"Ele já arrotou depois da última mamada?",
      opcoes:[
        {label:"Sim, já arrotou", tags:[]},
        {label:"Ainda não arrotou", tags:["DESCONFORTO"]},
        {label:"Não sei dizer", tags:[]}
      ]
    },
    {
      id:6,
      texto:"Há quanto tempo ele está na mesma posição?",
      opcoes:[
        {label:"Mudei a posição recentemente e ele segue chorando", tags:[]},
        {label:"Está há bastante tempo na mesma posição", tags:["DESCONFORTO"]},
        {label:"Não sei dizer", tags:[]}
      ]
    },
    {
      id:7,
      texto:"Como está a temperatura do ambiente?",
      dica:"A temperatura ideal para o bebê fica perto de 22°C. Sinta a nuca ou o peito dele: as mãos e os pés costumam ser naturalmente mais frios e não são um bom termômetro.",
      opcoes:[
        {label:"Agradável", tags:[]},
        {label:"Parece quente", tags:["AMBIENTE"]},
        {label:"Parece frio", tags:["AMBIENTE"]},
        {label:"Não sei dizer", tags:[]}
      ]
    },
    {
      id:8,
      texto:"Como está a roupa dele?",
      opcoes:[
        {label:"Parece confortável", tags:[]},
        {label:"Parece apertada, com etiqueta incomodando ou muitas camadas", tags:["DESCONFORTO"]},
        {label:"Não sei dizer", tags:[]}
      ]
    },
    {
      id:9,
      texto:"Como está o ambiente em termos de luz e som?",
      opcoes:[
        {label:"Calmo, com pouco estímulo", tags:[]},
        {label:"Muita luz, som ou movimento ao redor", tags:["AMBIENTE"]},
        {label:"Não sei dizer", tags:[]}
      ]
    },
    {
      id:10,
      texto:"O choro está parecido com o que costuma acontecer?",
      seguranca:true,
      opcoes:[
        {label:"Sim, parecido com outras vezes", tags:[]},
        {label:"Não, está mais intenso, mais agudo ou diferente do habitual", tags:["ATENCAO"]},
        {label:"Vem junto com outros sinais, como febre, vômito, muita moleza ou recusa em mamar", tags:["ATENCAO_FORTE"]}
      ]
    }
  ];

  var ORDEM = ["ALIMENTACAO","FRALDA","DESCANSO","DESCONFORTO","AMBIENTE"];
  var BLOCOS = {
    ALIMENTACAO:"Comece observando a alimentação. Já faz um tempo desde a última mamada.",
    FRALDA:"Verifique a fralda. É rápido e ajuda a descartar esse ponto logo.",
    DESCANSO:"Observe os sinais de sono ou cansaço. O tempo acordado já está grande.",
    DESCONFORTO:"Cheque possíveis desconfortos físicos: arroto, roupa ou posição.",
    AMBIENTE:"Dê uma olhada no ambiente: temperatura, luz e som podem estar incomodando."
  };

  var SINAIS_ATENCAO = [
    "Febre. Em bebês com menos de 3 meses, qualquer febre já pede avaliação no mesmo dia.",
    "Sonolência incomum ou dificuldade para acordar.",
    "Recusa em mamar por muito tempo.",
    "Vômitos repetidos.",
    "Poucas fraldas molhadas ou boca muito seca.",
    "Dificuldade para respirar.",
    "Manchas ou mudança de cor na pele.",
    "Choro muito diferente do habitual, que não muda mesmo depois de verificar os pontos anteriores."
  ];

  /* ---------------- state ---------------- */
  var state = {
    screen:"welcome",
    qIndex:0,
    selections: perguntas.map(function(){return null;}),
    resultFlags: [],
    attentionLevel: "none",
    advancing: false,
    advanceTimer: null,
    transitionTimer: null
  };

  var lastRenderedScreen = null;
  var lastRenderedQIndex = null;

  function resetState(){
    if(state.advanceTimer) clearTimeout(state.advanceTimer);
    if(state.transitionTimer) clearTimeout(state.transitionTimer);
    state.screen="welcome";
    state.qIndex=0;
    state.selections = perguntas.map(function(){return null;});
    state.resultFlags = [];
    state.attentionLevel = "none";
    state.advancing = false;
    state.advanceTimer = null;
    state.transitionTimer = null;
    lastRenderedScreen = null;
    lastRenderedQIndex = null;
  }

  function go(screen){
    if(state.advanceTimer){ clearTimeout(state.advanceTimer); state.advancing = false; }
    state.screen = screen;
    render();
  }

  function chooseOption(qIdx, optIdx){
    if(state.advancing) return;
    state.advancing = true;
    state.selections[qIdx] = optIdx;

    // Visual feedback WITHOUT full re-render (prevents card-enter animation replaying)
    var opts = document.querySelectorAll('.btn-option');
    opts.forEach(function(o, i){
      if(i === optIdx) o.classList.add('selected');
      else o.classList.remove('selected');
    });

    state.advanceTimer = setTimeout(function(){
      state.advancing = false;
      state.advanceTimer = null;
      if(qIdx < perguntas.length - 1){
        state.qIndex = qIdx + 1;
        render();
      } else {
        finishQuiz();
      }
    }, 300);
  }

  function goBack(){
    if(state.advanceTimer){ clearTimeout(state.advanceTimer); state.advancing = false; }
    if(state.qIndex === 0){ go("disclaimer"); return; }
    state.qIndex -= 1;
    render();
  }

  function finishQuiz(){
    go("transition");
    state.transitionTimer = setTimeout(function(){
      computeResult();
      go("result");
    }, 900);
  }

  function computeResult(){
    var tagSet = {};
    var attention = "none";
    perguntas.forEach(function(p, i){
      var sel = state.selections[i];
      if(sel === null) return;
      var tags = p.opcoes[sel].tags;
      tags.forEach(function(t){
        if(t === "ATENCAO"){ if(attention === "none") attention = "atencao"; }
        else if(t === "ATENCAO_FORTE"){ attention = "atencao_forte"; }
        else { tagSet[t] = true; }
      });
    });
    state.resultFlags = ORDEM.filter(function(t){ return tagSet[t]; });
    state.attentionLevel = attention;
  }

  /* ---------------- install to home screen ---------------- */
  var deferredPrompt = null;
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  var isStandalone = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true;

  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();
    deferredPrompt = e;
    render();
  });

  function installBannerHTML(){
    if(isStandalone) return "";
    if(isIOS){
      return '<div class="install-banner"><span>Adicione à tela inicial para abrir num toque na próxima vez.</span><button data-action="ios-instructions">Como fazer</button></div>' +
             '<div id="iosSteps"></div>';
    }
    if(deferredPrompt){
      return '<div class="install-banner"><span>Adicione à tela inicial para abrir num toque na próxima vez.</span><button data-action="install">Adicionar</button></div>';
    }
    return "";
  }

  function showIosSteps(){
    var el = document.getElementById("iosSteps");
    if(el){
      el.innerHTML = '<div class="ios-steps">No Safari: toque no ícone de compartilhar (o quadrado com a seta para cima) e depois em <b>Adicionar à Tela de Início</b>.</div>';
    }
  }

  /* ---------------- screen templates ---------------- */
  function screenWelcome(){
    return (
      '<div class="card">' +
        '<div class="dot-wrap"><div class="dot-aura"></div><div class="dot"></div></div>' +
        '<h1 tabindex="-1" data-autofocus>Seu bebê chorando não é um problema para você resolver sozinha, na pressa e no escuro.</h1>' +
        '<span class="accent-line"></span>' +
        '<p class="lede">O Mapa do Choro te dá, em poucos minutos, uma ordem prática do que verificar primeiro: alimentação, fralda, sono, conforto e ambiente.</p>' +
        '<p class="lede">Responder ao choro não estraga o bebê, ajuda ele a se sentir seguro.</p>' +
        '<button class="btn btn-primary" data-action="go" data-value="disclaimer">Começar meu mapa</button>' +
        installBannerHTML() +
      '</div>'
    );
  }

  function screenDisclaimer(){
    return (
      '<div class="card">' +
        '<span class="eyebrow">Antes de começar</span>' +
        '<h1 tabindex="-1" data-autofocus>Um combinado importante</h1>' +
        '<p>Este conteúdo é educativo e serve para organizar sua observação do dia a dia. Ele não diagnostica cólica, doenças ou qualquer condição de saúde e não substitui a avaliação de um pediatra.</p>' +
        '<p class="lede">Se em algum momento você sentir que algo foge do habitual, procure orientação profissional.</p>' +
        '<button class="btn btn-primary" data-action="go" data-value="question">Entendi, quero continuar</button>' +
      '</div>'
    );
  }

  function screenQuestion(){
    var i = state.qIndex;
    var p = perguntas[i];
    var pct = Math.round(((i+1)/perguntas.length)*100);
    var selIdx = state.selections[i];
    var optsHtml = p.opcoes.map(function(o, idx){
      var sel = selIdx === idx ? " selected" : "";
      return '<button class="btn-option' + sel + '" data-action="choose" data-qidx="' + i + '" data-optidx="' + idx + '"><span class="marker"></span><span>' + o.label + '</span></button>';
    }).join("");
    var dicaHtml = p.dica
      ? '<div class="dica"><span class="dica-icon">i</span><span><b>Dica de observação.</b> ' + p.dica + '</span></div>'
      : "";
    return (
      '<div class="card">' +
        '<div class="back-row"><button class="btn-text" data-action="back">‹ Voltar</button></div>' +
        '<div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div><span class="progress-label">' + (i+1) + ' / ' + perguntas.length + '</span></div>' +
        '<h2 tabindex="-1" data-autofocus>' + p.texto + '</h2>' +
        dicaHtml +
        '<div class="option-list">' + optsHtml + '</div>' +
      '</div>'
    );
  }

  function screenTransition(){
    return (
      '<div class="card" style="text-align:center;">' +
        '<div class="dot-wrap"><div class="dot-aura"></div><div class="dot"></div></div>' +
        '<h2 tabindex="-1" data-autofocus>Montando seu mapa</h2>' +
        '<p class="lede">Organizando a ordem prática para você verificar agora.</p>' +
      '</div>'
    );
  }

  function screenResult(){
    var forte = state.attentionLevel === "atencao_forte";
    var flags = state.resultFlags;

    var alertHtml = "";
    if(forte){
      alertHtml = '<div class="alert-banner"><strong>Alguns sinais merecem atenção agora</strong><p>Antes de seguir com a lista, veja os sinais de atenção.</p></div>';
    }

    var itemsHtml, introText;
    if(flags.length > 0){
      introText = "Pelas suas respostas, veja a ordem prática para verificar agora.";
      itemsHtml = flags.map(function(tag, idx){
        return '<li><span class="result-num">' + (idx+1) + '</span><span>' + BLOCOS[tag] + '</span></li>';
      }).join("");
    } else {
      introText = "Nenhum sinal específico se destacou. Siga a ordem geral de observação:";
      itemsHtml = ORDEM.map(function(tag, idx){
        return '<li><span class="result-num">' + (idx+1) + '</span><span>' + BLOCOS[tag] + '</span></li>';
      }).join("");
    }

    var actionBtn = forte
      ? '<button class="btn btn-alert" data-action="go" data-value="attention">Ver sinais de atenção agora</button>'
      : '<button class="btn btn-primary" data-action="go" data-value="testOneAtATime">Ver como testar um passo de cada vez</button>';

    return (
      '<div class="card">' +
        '<span class="eyebrow">Seu mapa</span>' +
        '<h1 tabindex="-1" data-autofocus>Sua ordem de observação</h1>' +
        alertHtml +
        '<p class="lede">' + introText + '</p>' +
        '<ul class="result-list">' + itemsHtml + '</ul>' +
        '<p class="lede">Teste uma alternativa por vez e observe a resposta do bebê antes de seguir para a próxima.</p>' +
        actionBtn +
      '</div>'
    );
  }

  function screenTestOneAtATime(){
    return (
      '<div class="card">' +
        '<div class="back-row"><button class="btn-text" data-action="go" data-value="result">‹ Voltar ao mapa</button></div>' +
        '<span class="eyebrow">Como usar</span>' +
        '<h1 tabindex="-1" data-autofocus>Um passo de cada vez</h1>' +
        '<p>Verifique o primeiro item da lista. Se o choro não mudar em alguns minutos, siga para o próximo, sempre um por vez.</p>' +
        '<p class="lede">Isso evita tentar resolver tudo ao mesmo tempo e ajuda você a perceber o que realmente muda a resposta do bebê.</p>' +
        '<button class="btn btn-primary" data-action="go" data-value="attention">Ver sinais de atenção</button>' +
      '</div>'
    );
  }

  function screenAttention(){
    var forte = state.attentionLevel === "atencao_forte";
    var titulo = forte ? "Sinais que merecem atenção agora" : "Quando vale a pena chamar o pediatra";
    var intro = forte
      ? "Procure avaliação médica o quanto antes. Este mapa organiza sua observação do dia a dia, mas alguns sinais pedem atenção profissional imediata:"
      : "Este mapa ajuda a organizar o que observar no dia a dia. Alguns sinais, no entanto, pedem avaliação profissional o quanto antes:";
    var listHtml = SINAIS_ATENCAO.map(function(s){ return '<li><span>' + s + '</span></li>'; }).join("");
    var eyebrowCls = forte ? "eyebrow alert-eb" : "eyebrow";
    var eyebrowText = forte ? "Atenção" : "Sinais de alerta";
    return (
      '<div class="card">' +
        '<span class="' + eyebrowCls + '">' + eyebrowText + '</span>' +
        '<h1 tabindex="-1" data-autofocus>' + titulo + '</h1>' +
        '<p class="lede">' + intro + '</p>' +
        '<ul class="signal-list">' + listHtml + '</ul>' +
        '<p class="lede">Se notar qualquer um desses sinais, procure atendimento médico. Este material não substitui uma avaliação profissional.</p>' +
        '<button class="btn btn-primary" data-action="go" data-value="delivery">Acessar meus materiais</button>' +
      '</div>'
    );
  }

  function screenDelivery(){
    var materiais = [
      {label:"Diário do Choro",              href:"pdfs/01-diario-do-choro.pdf"},
      {label:"Registro de mamadas",          href:"pdfs/02-registro-de-mamadas.pdf"},
      {label:"Registro de sono",             href:"pdfs/03-registro-de-sono.pdf"},
      {label:"Controle de fraldas",          href:"pdfs/04-controle-de-fraldas.pdf"},
      {label:"Checklist para cuidadores",    href:"pdfs/05-checklist-cuidadores.pdf"},
      {label:"Cartão de sinais de atenção",  href:"pdfs/06-cartao-sinais-atencao.pdf"},
      {label:"Fluxograma completo",          href:"pdfs/07-fluxograma-completo.pdf"}
    ];
    var itemsHtml = materiais.map(function(m){
      return '<a href="' + m.href + '" target="_blank" rel="noopener">' + m.label + '<span class="arrow">→</span></a>';
    }).join("");
    return (
      '<div class="card">' +
        '<div class="dot-wrap small"><div class="dot-aura"></div><div class="dot"></div></div>' +
        '<span class="eyebrow">Pronto</span>' +
        '<h1 tabindex="-1" data-autofocus>Seu mapa está pronto</h1>' +
        '<p class="lede">Use os materiais abaixo sempre que precisar, sem depender da memória em momentos de cansaço.</p>' +
        '<ul class="material-list">' + itemsHtml + '</ul>' +
        installBannerHTML() +
        '<button class="btn btn-text center" data-action="restart">Fazer o mapa novamente</button>' +
      '</div>'
    );
  }

  var screens = {
    welcome:screenWelcome,
    disclaimer:screenDisclaimer,
    question:screenQuestion,
    transition:screenTransition,
    result:screenResult,
    testOneAtATime:screenTestOneAtATime,
    attention:screenAttention,
    delivery:screenDelivery
  };

  function render(){
    var app = document.getElementById("app");
    if(!screens[state.screen]){ state.screen = "welcome"; }
    var screenChanged =
      state.screen !== lastRenderedScreen ||
      (state.screen === "question" && state.qIndex !== lastRenderedQIndex);

    app.innerHTML = screens[state.screen]();

    if(screenChanged){
      var card = app.querySelector('.card');
      if(card){ card.classList.add('card--entering'); }
    }

    var f = app.querySelector("[data-autofocus]");
    if(f){ try { f.focus({preventScroll:true}); } catch(e){ f.focus(); } }

    lastRenderedScreen = state.screen;
    lastRenderedQIndex = state.qIndex;
  }

  /* ---------------- events ---------------- */
  document.getElementById("app").addEventListener("click", function(e){
    var el = e.target.closest("[data-action]");
    if(!el) return;
    var action = el.getAttribute("data-action");
    if(action === "go"){
      go(el.getAttribute("data-value"));
    } else if(action === "choose"){
      chooseOption(parseInt(el.getAttribute("data-qidx"),10), parseInt(el.getAttribute("data-optidx"),10));
    } else if(action === "back"){
      goBack();
    } else if(action === "restart"){
      resetState();
      state.screen = "welcome";
      render();
    } else if(action === "install"){
      if(deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.finally(function(){ deferredPrompt = null; render(); });
      }
    } else if(action === "ios-instructions"){
      showIosSteps();
    }
  });

  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }

  render();
})();
</script>
</body>
</html>
